version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: study_designer_postgres
    environment:
      POSTGRES_USER: regulatory
      POSTGRES_PASSWORD: regulatory
      POSTGRES_DB: regulatory_chat
    ports:
      - "5432:5432"
    volumes:
      - regulatory_pg_data:/var/lib/postgresql/data
    networks:
      - study_designer_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regulatory -d regulatory_chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: study_designer_backend
    ports:
      - "8001:8001"
    volumes:
      # Mount data directory if needed (optional)
      # - ./data:/app/data:ro
      # Mount logs for persistence
      - ./backend/logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://regulatory:regulatory@postgres:5432/regulatory_chat
      - CHAT_PERSISTENCE_ENABLED=true
      - CHAT_AUTO_CREATE_SCHEMA=true
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - study_designer_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked at `docker compose build`; must be reachable from the host browser (not the backend service name).
        NEXT_PUBLIC_API_URL: http://127.0.0.1:8001
        NEXT_PUBLIC_AGENT_WS_URL: ws://127.0.0.1:8001/ws
        NEXT_PUBLIC_CHAT_PERSISTENCE: "true"
    container_name: study_designer_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - study_designer_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  study_designer_network:
    driver: bridge

volumes:
  backend_logs:
  regulatory_pg_data:
