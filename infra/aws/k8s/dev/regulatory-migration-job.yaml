apiVersion: batch/v1
kind: Job
metadata:
  name: regulatory-db-migrate
  namespace: regulatory-dev
  labels:
    app.kubernetes.io/name: regulatory-db-migrate
    app.kubernetes.io/part-of: lotor-regulatory-assistant
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: regulatory-db-migrate
        app.kubernetes.io/part-of: lotor-regulatory-assistant
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ${BACKEND_IMAGE_URI}
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command: ["alembic", "upgrade", "head"]
          env:
            - name: HOME
              value: /tmp
          envFrom:
            - secretRef:
                name: regulatory-backend-env
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
