[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    integration: live HTTP to openFDA (set OPENFDA_INTEGRATION=1 to run)
    live_api: live HTTP to public APIs (OpenAlex, Crossref, NIH, etc.; set LIVE_API_AGENTS_INTEGRATION=1)
    engine_e2e: dynamic reasoning engine agent wiring (stubbed or live subset)
